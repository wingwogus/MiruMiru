name: mirumiru

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mirumiru}
      POSTGRES_USER: ${POSTGRES_USER:-monikhyun}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-miru}
    ports:
      - "5432:5432"
    volumes:
      - mirumiru_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - mirumiru_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 30

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_DB: ${POSTGRES_DB:-mirumiru}
      POSTGRES_USER: ${POSTGRES_USER:-monikhyun}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-miru}
      POSTGRES_SCHEMA: ${POSTGRES_SCHEMA:-public}
      JWT_SECRET: ${JWT_SECRET:-o99Rv7wh67IKXLrmu2E8N8JgZqoIrouYsr7INeLsdanDWvy65l510MgI824fyensnGLsSJ7yVBntVB9AbcW10g==}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mirumiru_pgdata:
  mirumiru_redisdata:
