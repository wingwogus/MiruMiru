spring:
  config:
    activate:
      on-profile: bootstrap

  main:
    web-application-type: none

  sql:
    init:
      mode: never

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: false
    open-in-view: false

chat:
  room:
    cleanup:
      enabled: false
