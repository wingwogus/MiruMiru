name: MiruMiru Backend CI/CD

on:
  push:
    branches: [ "main" ]  # main 브랜치에 Push 될 때만 실행
    paths:
      - 'backend/**'      # 백엔드 코드가 변경됐을 때만 실행 (프론트엔드 변경 시 무시)

permissions:
  contents: write

concurrency:
  group: mirumiru-backend-cicd-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. 최신 코드 가져오기
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Resolve Docker Image Repository
      id: image
      working-directory: ./backend/charts/mirumiru
      run: |
        IMAGE_REPOSITORY=$(awk '/^[[:space:]]*repository:/ {print $2; exit}' values.yaml)
        echo "repository=${IMAGE_REPOSITORY}" >> "$GITHUB_OUTPUT"

    # 2. 빌드 공장에 Java 21 세팅
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    # 3. API 실행 jar 생성
    - name: Package API
      working-directory: ./backend
      run: |
        chmod +x gradlew
        ./gradlew --no-daemon clean :api:bootJar

    # 4. 도커 허브에 로그인 (깃허브 Secrets에 등록한 정보 사용)
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 5. Docker 이미지 굽고 도커 허브 전송
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: true
        # 태그명: 깃허브 커밋 해시(고유번호)와 latest 두 가지로 저장
        tags: |
          ${{ steps.image.outputs.repository }}:${{ github.sha }}
          ${{ steps.image.outputs.repository }}:latest

    # 6. Helm 차트의 버전을 방금 만든 새 이미지 버전으로 덮어쓰기
    - name: Update Helm values.yaml
      working-directory: ./backend/charts/mirumiru
      run: |
        if grep -q "tag: \"${GITHUB_SHA}\"" values.yaml; then
          echo "values.yaml already points to ${GITHUB_SHA}"
          exit 0
        fi

        sed -i "s#^\([[:space:]]*tag:[[:space:]]*\).*#\1\"${GITHUB_SHA}\"#" values.yaml

        # 깃허브 봇 이름으로 변경 사항을 다시 Commit & Push
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add values.yaml
        if git diff --cached --quiet; then
          echo "No Helm changes to commit"
          exit 0
        fi
        git commit -m "chore: sync backend image tag to ${GITHUB_SHA} [skip ci]"
        git push origin HEAD:main
